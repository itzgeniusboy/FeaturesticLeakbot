name: 24x7 Telegram Bot Loop

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'

jobs:
  run-bot-job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install PyTelegramBotAPI
      run: |
        python -m pip install --upgrade pip
        pip install pyTelegramBotAPI

    - name: Find and Run Bot Script
      run: |
        echo "=== Checking where bot.py is located ==="
        find . -name "bot.py"
        echo "========================================"
        # Ye command pooriki pooris repository me bot.py dhoond kar use run kar degi
        find . -name "bot.py" -exec python {} \;

    - name: Trigger Next Loop (24x7 Continuous)
      if: always()
      run: |
        curl -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/run.yml/dispatches \
          -d '{"ref":"${{ github.ref_name }}"}'
